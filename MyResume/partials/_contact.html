<section class="contact-section" id="contact">
  <div class="container">
    <h2 class="section-title" data-aos="fade-in" data-aos-offset="10">Contact Me</h2>
    <div class="main">
      <div class="row">
        <div class="col-md-12">
          <div class="card mb-0" data-aos="zoom-in" data-aos-offset="100">
            <div class="row">
              <div class="col-sm-6 col-xm-12 col-md-6">
                <div class="card-body">
                  <p><strong>Contact by Email</strong></p>
                  <div class="row mb-3">
                    <div class="col">
                      <div class="input-group">
                        <span class="input-group-addon"><!-- Email icon --></span>
                        <input class="form-control subject" type="text" placeholder="Subject">
                      </div>
                    </div>
                  </div>
                  <div class="row mb-3">
                    <div class="col">
                      <div class="input-group">
                        <textarea class="form-control message" placeholder="Message" rows="5"></textarea>
                      </div>
                    </div>
                  </div>
                  <div class="row"><div class="col"><button class="btn btn-primary send-btn">Send</button></div></div>
                </div>
              </div>

              <div class="col-md-6">
                <div class="card-body">
                  <p class="mb-0"><strong>Phone</strong></p><p class="pb-2 phone"></p>
                  <p class="mb-0"><strong>Email</strong></p><p class="pb-2 email"></p>
                  <p class="mb-0"><strong>Address</strong></p><p class="pb-2 address"></p>
                </div>
              </div>
            </div>

            <div class="row">
              <div class="col-md-12">
                <div class="card-body">
                  <div class="container text-center icon-insert"><!-- Social icons injected by JS --></div>
                </div>
              </div>
            </div>
          </div><!-- /card -->
        </div>
      </div>
    </div>
  </div>
</section>
